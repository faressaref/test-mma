<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose Channel</title>

<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial;
  color: white;
  padding-bottom: 70px;
}

/* ☰ زرار */
.menu-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  font-size: 24px;
  background: #111;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  z-index: 1002;
}

/* القائمة */
.side-menu {
  position: fixed;
  top: 0;
  right: -260px;
  width: 220px;
  height: 100%;
  background: #111;
  padding-top: 60px;
  transition: right 0.3s ease;
  z-index: 1002;
}

.side-menu.open {
  right: 0;
}

.side-menu a {
  display: block;
  padding: 14px;
  color: white;
  text-decoration: none;
}

.side-menu a:hover {
  background: #1a1a1a;
}

/* overlay */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
  z-index: 1001;
}

.overlay.show {
  opacity: 1;
  pointer-events: all;
}

/* title */
.title {
  text-align: center;
  margin: 25px 0;
  font-size: 24px;
}

/* grid */
.wrapper {
  display: flex;
  justify-content: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 20px;
  width: 90%;
  max-width: 800px;
}

.card {
  background: #111;
  border-radius: 16px;
  padding: 25px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  background: #1a1a1a;
  transform: scale(1.08);
}

.card img {
  width: 90px;
  margin-bottom: 10px;
}

/* 📱 bottom nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  display: flex;
  justify-content: space-around;
  padding: 8px 0;
  z-index: 1000;
}

@media (min-width: 768px) {
  .bottom-nav {
    display: none;
  }
}

.bottom-nav a {
  color: white;
  text-decoration: none;
  font-size: 14px;
  text-align: center;
}
</style>
</head>

<body>

<!-- ☰ -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

</div>

<!-- overlay -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<script>
function go(ch) {
  window.location.href = "watch.html?ch=" + ch;
}

function toggleMenu() {
  const menu = document.getElementById("sideMenu");
  const overlay = document.getElementById("overlay");

  menu.classList.toggle("open");
  overlay.classList.toggle("show");
}

function closeMenu() {
  document.getElementById("sideMenu").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
}
</script>
