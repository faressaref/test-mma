<!-- 🔥 FIREBASE LIVE CONTROL -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔐 Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyA04-mZ_1Ptqwur9SW3WSCLpSOplQIHEU4",
  authDomain: "mma-live-bc4ab.firebaseapp.com",
  projectId: "mma-live-bc4ab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🎯 Variables */
let streamLink = "";
let isLive = false;
let loaded = false;

/* 🔄 تحميل بيانات اللايف */
async function loadLive() {
  try {
    const liveDoc = await getDoc(doc(db, "live", "current"));

    if (liveDoc.exists()) {
      const data = liveDoc.data();
      streamLink = data.link || "";
      isLive = data.status === "on";
    }

  } catch (e) {
    console.log("Firebase Error:", e);
  }

  loaded = true;
}

/* شغّل التحميل */
loadLive();

/* 🔴 لما المستخدم يدوس */
window.openStream = function() {

  /* لو لسه محملش */
  if (!loaded) {
    alert("⏳ Loading stream...");
    return;
  }

  if (isLive && streamLink) {
    window.open(streamLink, "_blank");
  } else {
    window.location.href = "no-stream.html";
  }

}
</script>
