<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2709588519078306"
     crossorigin="anonymous"></script>
<title>Watch Live</title>

<style>
body {
  background: #121212;
  margin: 0;
  font-family: Arial;
  color: white;
}

/* 🎬 Player */
.player-container {
  max-width: 900px;
  margin: 100px auto;
  padding: 10px;
}

.player {
  position: relative;
  width: 100%;
  background: black;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 0 30px rgba(255, 59, 59, 0.2);
}

.player iframe {
  width: 100%;
  height: 500px;
  border: none;
}

/* 🎮 Controls */
.controls {
  position: absolute;
  bottom: 10px;
  right: 10px;
}

.controls button {
  background: rgba(0,0,0,0.6);
  border: none;
  color: white;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}

/* 📱 موبايل */
@media (max-width: 768px) {
  .player iframe {
    height: 250px;
  }

  .player-container {
    margin: 60px auto;
  }
}
</style>

</head>

<body>

<div class="player-container">

  <h2 style="text-align:center;margin-bottom:20px;">🔴 Live Stream</h2>

  <div class="player" id="playerBox">

    <!-- الفيديو -->
    <iframe id="videoFrame" src="" allowfullscreen></iframe>

    <!-- controls -->
    <div class="controls">
      <button onclick="goFull()">⛶</button>
    </div>

  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA04-mZ_1Ptqwur9SW3WSCLpSOplQIHEU4",
  authDomain: "mma-live-bc4ab.firebaseapp.com",
  projectId: "mma-live-bc4ab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadStream() {
  try {
    const snap = await getDoc(doc(db, "live", "current"));

    if (snap.exists()) {
      const data = snap.data();

      // ❌ لو مفيش بث
      if (data.status !== "on" || !data.link) {
        window.location.href = "no-stream.html";
        return;
      }

      // ✅ لو في بث
      document.getElementById("videoFrame").src = data.link;

    } else {
      window.location.href = "no-stream.html";
    }

  } catch (error) {
    console.log(error);
    window.location.href = "no-stream.html";
  }
}

loadStream();

// 🔥 Fullscreen
window.goFull = function () {
  const player = document.getElementById("playerBox");

  if (player.requestFullscreen) {
    player.requestFullscreen();
  }
};
</script>

</body>
</html>
