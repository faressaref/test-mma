/* ☰ */
.menu-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  font-size: 24px;
  background: #111;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  z-index: 1002;
}

.side-menu {
  position: fixed;
  top: 0;
  right: -260px;
  width: 220px;
  height: 100%;
  background: #111;
  padding-top: 60px;
  transition: right 0.3s ease;
  z-index: 1002;
}

.side-menu.open {
  right: 0;
}

.side-menu a {
  display: block;
  padding: 14px;
  color: white;
  text-decoration: none;
}

/* overlay */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
  z-index: 1001;
}

.overlay.show {
  opacity: 1;
  pointer-events: all;
}

/* title */
.title {
  text-align: center;
  margin: 20px 0;
  font-size: 22px;
}

/* player */
.player-container {
  width: 100%;
  max-width: 700px;
  margin: 30px auto 80px;
  text-align: center;
}

video {
  width: 100%;
  border-radius: 12px;
}

/* 📱 */

  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  display: flex;
  justify-content: space-around;
  padding: 8px 0;
  z-index: 1000;
}

@media (min-width: 768px) {
  .bottom-nav {
    display: none;
  }
}

.bottom-nav a {
  color: white;
  text-decoration: none;
  font-size: 14px;

<script>
function toggleMenu() {
  const menu = document.getElementById("sideMenu");
  const overlay = document.getElementById("overlay");
  menu.classList.toggle("open");
  overlay.classList.toggle("show");
}

function closeMenu() {
  document.getElementById("sideMenu").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
}

/* PLAYER */
const params = new URLSearchParams(window.location.search);
const ch = params.get("ch");

const video = document.getElementById("video");
const title = document.getElementById("title");

let url = "";

if (ch === "espn") {
  url = "http://41.205.93.154/ESPN/index.m3u8";
  title.innerText = "📺 ESPN";
}
else if (ch === "espn8") {

if (url) {

}
</script>
