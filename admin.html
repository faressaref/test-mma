<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body {
  background: #0b0b0b;
  color: white;
  font-family: Arial;
  text-align: center;
  padding: 20px;
}

.box {
  max-width: 400px;
  margin: auto;
  background: #111;
  padding: 20px;
  border-radius: 12px;
}

input, button {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: red;
  color: white;
  cursor: pointer;
}

button:hover {
  background: darkred;
}
</style>
</head>

<body>

<div id="loginBox" class="box">
  <h2>🔐 Admin Login</h2>
  <input type="password" id="password" placeholder="Enter Password">
  <button onclick="login()">Login</button>
</div>

<div id="panel" class="box" style="display:none;">
  <h2>⚙️ Admin Panel</h2>

  <h3>📰 Add News</h3>
  <input id="newsTitle" placeholder="News Title">
  <button onclick="addNews()">Publish News</button>

  <h3>🔴 Go Live</h3>
  <input id="eventName" placeholder="Event Name (UFC 300)">
  <input id="channelName" placeholder="Channel Name (ESPN)">
  <input id="channelId" placeholder="Channel ID (espn)">
  <button onclick="sendLive()">Send Live</button>

</div>

<script>
const PASSWORD = "1234"; // غيره

function login() {
  const pass = document.getElementById("password").value;

  if (pass === PASSWORD) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";
  } else {
    alert("Wrong password");
  }
}

// 📰 خبر
async function addNews() {
  const title = document.getElementById("newsTitle").value;

  if (!title) return alert("Enter title");

  await fetch("/api/telegram?text=" + encodeURIComponent(`
📰 <b>New Update</b>

${title}

📖 Read:
https://fightsphere.vercel.app/news.html
`));

  alert("News sent 🔥");
}

// 🔴 لايف
async function sendLive() {

  const eventName = document.getElementById("eventName").value;
  const channelName = document.getElementById("channelName").value;
  const channelId = document.getElementById("channelId").value;

  if (!eventName || !channelId) return alert("Fill all fields");

  const msg = `
🔴 <b>LIVE NOW</b>

🥊 ${eventName}
📺 Channel: ${channelName}

🔥 Watch:
https://fightsphere.vercel.app/watch.html?ch=${channelId}
`;

  await fetch("/api/telegram?text=" + encodeURIComponent(msg));

  alert("Live sent 🚀");
}
</script>

</body>
</html>
