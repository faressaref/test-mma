<script>
function getFighterImage(name) {
  return `https://images.weserv.nl/?url=${encodeURIComponent("https://www.google.com/search?q=" + name + " fighter mma&tbm=isch")}`;
}

// 🔥 تركيب الصور
document.querySelectorAll(".fighters").forEach(fight => {

  const names = fight.querySelectorAll(".name");

  names.forEach(nameEl => {
    const name = nameEl.innerText;

    const img = document.createElement("img");

    img.src = `https://source.unsplash.com/100x100/?fighter,${encodeURIComponent(name)}`;

    img.style.width = "60px";
    img.style.height = "60px";
    img.style.borderRadius = "50%";
    img.style.objectFit = "cover";
    img.style.marginBottom = "5px";

    img.onerror = function () {
      this.src = "https://ui-avatars.com/api/?name=" + encodeURIComponent(name);
    };

    nameEl.parentElement.insertBefore(img, nameEl);
  });

});
</script>
